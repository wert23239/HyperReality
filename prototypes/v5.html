<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyper Reality — Zine</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=IBM+Plex+Mono:wght@100;400;700&family=Crimson+Pro:ital,wght@0,200;0,900;1,200&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1280px; height: 800px; overflow: hidden;
  background: #f2ede6;
  position: relative; color: #1a1a1a;
}
/* torn paper texture strips */
.tear-strip {
  position: absolute; height: 100%;
  background: #e8e0d4;
  clip-path: polygon(0 0, 100% 3%, 100% 97%, 0 100%);
}
.tear-1 { left: 200px; width: 340px; transform: rotate(-1deg); opacity: 0.5; }
.tear-2 { right: 100px; width: 260px; transform: rotate(2deg); opacity: 0.3; top: -20px; }
/* washi tape */
.tape {
  position: absolute; width: 160px; height: 32px;
  background: rgba(252,229,136,0.7);
  transform: rotate(-5deg);
}
.tape2 {
  position: absolute; width: 120px; height: 28px;
  background: rgba(180,210,190,0.6);
  transform: rotate(8deg);
}
/* title - chaotic */
.title-block {
  position: absolute; top: 40px; left: 60px;
  transform: rotate(-3deg);
  z-index: 10;
}
.title-block h1 {
  font-family: 'Caveat', cursive; font-weight: 700;
  font-size: 88px; line-height: 0.9;
  background: #1a1a1a; color: #f2ede6;
  display: inline-block; padding: 4px 20px;
}
.title-block .line2 {
  font-family: 'Caveat', cursive; font-weight: 700;
  font-size: 88px; line-height: 0.9;
  display: inline-block; padding: 4px 20px;
  border: 3px solid #1a1a1a;
  margin-top: 4px;
}
/* subtitle torn paper */
.subtitle-card {
  position: absolute; top: 230px; left: 80px;
  background: #fff;
  padding: 12px 24px;
  transform: rotate(2deg);
  box-shadow: 2px 3px 8px rgba(0,0,0,0.1);
  clip-path: polygon(2% 0, 100% 1%, 98% 100%, 0 97%);
  z-index: 10;
  font-family: 'Crimson Pro', serif; font-weight: 200;
  font-size: 16px; font-style: italic; color: #555;
  letter-spacing: 1px;
}
/* tagline - big and rotated */
.tagline-zine {
  position: absolute; top: 340px; left: 300px;
  font-family: 'Caveat', cursive; font-size: 56px;
  transform: rotate(-6deg);
  color: #c33;
  z-index: 12;
  text-shadow: 2px 2px 0 #fce588;
}
/* H-diagram collaged */
.h-diagram-zine {
  position: absolute; top: 120px; right: 60px;
  width: 380px; height: 320px;
  transform: rotate(3deg);
  background: #fff;
  padding: 20px;
  box-shadow: 3px 4px 12px rgba(0,0,0,0.12);
  clip-path: polygon(1% 2%, 99% 0, 100% 98%, 0 100%);
  z-index: 8;
}
/* dice stickers */
.sticker {
  position: absolute; z-index: 15;
  background: #fff;
  border-radius: 4px;
  padding: 8px;
  box-shadow: 2px 2px 6px rgba(0,0,0,0.15);
}
.sticker-1 { top: 460px; left: 100px; transform: rotate(-12deg); }
.sticker-2 { top: 500px; left: 220px; transform: rotate(8deg); }
.sticker-3 { top: 440px; left: 320px; transform: rotate(-4deg); }
/* versions stamp */
.stamp {
  position: absolute; bottom: 80px; right: 120px;
  font-family: 'Caveat', cursive; font-weight: 700;
  font-size: 48px; color: #c33;
  border: 4px solid #c33; border-radius: 8px;
  padding: 8px 20px;
  transform: rotate(-8deg);
  z-index: 14;
  opacity: 0.85;
}
.stamp small {
  display: block; font-size: 18px; font-weight: 400;
}
/* unique */
.unique-label {
  position: absolute; bottom: 200px; left: 440px;
  font-family: 'IBM Plex Mono', monospace; font-weight: 700;
  font-size: 16px; letter-spacing: 2px;
  text-transform: uppercase;
  background: #fce588; padding: 6px 14px;
  transform: rotate(1deg);
  z-index: 14;
}
/* CTA */
.cta-zine {
  position: absolute; bottom: 40px; left: 80px;
  font-family: 'Caveat', cursive; font-size: 30px;
  background: #1a1a1a; color: #f2ede6;
  padding: 12px 36px; border: none; cursor: pointer;
  transform: rotate(-2deg);
  z-index: 16;
  box-shadow: 3px 3px 0 #c33;
}
/* scattered text bits */
.scatter {
  position: absolute;
  font-family: 'IBM Plex Mono', monospace; font-weight: 100;
  font-size: 11px; color: #aaa; letter-spacing: 2px;
  text-transform: uppercase;
  z-index: 5;
}
</style>
</head>
<body>
<div class="tear-strip tear-1"></div>
<div class="tear-strip tear-2"></div>

<div class="tape" style="top:180px;left:40px"></div>
<div class="tape2" style="top:100px;right:180px"></div>
<div class="tape" style="bottom:120px;right:60px;transform:rotate(12deg);background:rgba(200,180,200,0.5)"></div>

<div class="title-block">
  <h1>HYPER</h1><br>
  <span class="line2">REALITY</span>
</div>

<div class="subtitle-card">The Mysterious Death of Alex Lambert 2</div>

<div class="tagline-zine">"a cockroach<br>vs. a king?"</div>

<div class="h-diagram-zine">
  <svg width="340" height="280" viewBox="0 0 340 280" fill="none">
    <line x1="70" y1="30" x2="70" y2="250" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="270" y1="30" x2="270" y2="250" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="70" y1="140" x2="270" y2="140" stroke="#1a1a1a" stroke-width="2"/>
    <text x="20" y="24" font-family="Caveat" font-size="20" fill="#c33">Hydrogen</text>
    <text x="230" y="24" font-family="Caveat" font-size="20" fill="#3a3">Heaven</text>
    <text x="40" y="274" font-family="Caveat" font-size="20" fill="#a33">Hell</text>
    <text x="244" y="274" font-family="Caveat" font-size="20" fill="#339">Habit</text>
  </svg>
</div>

<!-- dice stickers -->
<div class="sticker sticker-1">
  <svg width="60" height="52" viewBox="0 0 60 52"><polygon points="30,3 57,49 3,49" fill="#fce588" stroke="#1a1a1a" stroke-width="2"/><text x="30" y="40" text-anchor="middle" font-family="Caveat" font-size="20" fill="#1a1a1a">3</text></svg>
</div>
<div class="sticker sticker-2">
  <svg width="52" height="60" viewBox="0 0 52 60"><polygon points="26,3 49,30 26,57 3,30" fill="#b8e0c0" stroke="#1a1a1a" stroke-width="2"/><text x="26" y="36" text-anchor="middle" font-family="Caveat" font-size="20" fill="#1a1a1a">4</text></svg>
</div>
<div class="sticker sticker-3">
  <svg width="60" height="60" viewBox="0 0 60 60"><polygon points="30,3 57,22 48,55 12,55 3,22" fill="#d8c0e0" stroke="#1a1a1a" stroke-width="2"/><text x="30" y="40" text-anchor="middle" font-family="Caveat" font-size="20" fill="#1a1a1a">5</text></svg>
</div>

<div class="unique-label">A BOOK UNIQUE TO YOU</div>

<div class="stamp">6,561<small>unique versions</small></div>

<button class="cta-zine">Take the Survey →</button>

<div class="scatter" style="top:300px;left:60px;transform:rotate(90deg)">interactive fiction</div>
<div class="scatter" style="bottom:30px;right:400px">choose your path</div>
<div class="scatter" style="top:20px;right:30px;transform:rotate(-2deg)">est. 2025</div>

</body>
</html>
